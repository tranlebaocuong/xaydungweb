<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHƯƠNG TRÌNH TU HỌC GIA ĐÌNH PHẬT TỬ</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="styles.css?v=13" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <button id="menuToggle" class="menu-toggle" type="button" aria-controls="lessonPanel" aria-expanded="false" aria-label="Mở danh sách bài học">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <h1>TÀI LIỆU TU HỌC</h1>
      <p>Nhấp bên trái để tìm kiếm bậc học bạn cần tài liệu.</p>
      </header>

      <main class="app-main">
      <aside id="lessonPanel" class="lesson-list" aria-label="Danh sách bài học">
        <h2>Danh sách bài học</h2>
        <div id="lessonButtons" class="buttons"></div>
      </aside>

      <section class="lesson-content">
        <h2 id="lessonTitle" class="lesson-title hidden"></h2>
        <div id="lessonPlaceholder" class="placeholder">
          <p>Mở thanh trượt trên cùng ở bên trái để xem bậc học bạn cần tìm tài liệu.</p>
        </div>
        <article id="lessonOutput" class="output hidden"></article>
      </section>
    </main>
  </div>

    <script src="script.js?v=17"></script>
</body>
</html>
