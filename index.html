<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Phật Pháp - Hướng Thiện</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>TÀI LIỆU TU HỌC</h1>
      <p>Chọn một mục bên trái: bắt đầu từ "HƯỚNG THIỆN" hoặc "SƠ THIỆN", sau đó chọn nhánh và bài học tương ứng.</p>

    <main class="app-main">
      <aside class="lesson-list">
        <h2>Danh sách bài học</h2>
        <div id="lessonButtons" class="buttons"></div>
      </aside>

      <section class="lesson-content">
        <h2 id="lessonTitle" class="lesson-title hidden"></h2>
        <div id="lessonPlaceholder" class="placeholder">
          <p>Chọn một bài học ở bên trái để xem nội dung.</p>
        </div>
        <article id="lessonOutput" class="output hidden"></article>
      </section>
    </main>
  </div>

  <script src="script.js?v=20260614"></script>
</body>
</html>
